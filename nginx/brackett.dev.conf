# /etc/nginx/sites-available/brackett.dev
# Symlink to /etc/nginx/sites-enabled/brackett.dev to activate.

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name brackett.dev www.brackett.dev api.brackett.dev;
    return 301 https://$host$request_uri;
}

# brackett.dev — React SPA
server {
    listen 443 ssl http2;
    server_name brackett.dev www.brackett.dev;

    ssl_certificate     /etc/letsencrypt/live/brackett.dev/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/brackett.dev/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    root  /var/www/brackett.dev/dist;
    index index.html;

    # Pass real client IP to FastAPI
    set_real_ip_from  0.0.0.0/0;
    real_ip_header    X-Forwarded-For;
    real_ip_recursive on;

    # Serve static React build; fall back to index.html for SPA routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API + SSE to FastAPI
    location /api/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Required for SSE (GET /api/v1/visitors/stream)
        proxy_buffering        off;
        proxy_cache            off;
        proxy_read_timeout     3600s;
        proxy_connect_timeout  60s;
    }

    # Serve PDFs directly (place under /var/www/brackett.dev/static/)
    location /static/ {
        alias /var/www/brackett.dev/static/;
        add_header Content-Disposition inline;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
}

# api.brackett.dev — FastAPI backend (alternative subdomain entry point)
server {
    listen 443 ssl http2;
    server_name api.brackett.dev;

    ssl_certificate     /etc/letsencrypt/live/brackett.dev/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/brackett.dev/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    set_real_ip_from  0.0.0.0/0;
    real_ip_header    X-Forwarded-For;
    real_ip_recursive on;

    location / {
        proxy_pass         http://127.0.0.1:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_buffering        off;
        proxy_cache            off;
        proxy_read_timeout     3600s;
    }
}
