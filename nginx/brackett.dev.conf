# /etc/nginx/sites-available/tjbrackett.com
# Symlink to /etc/nginx/sites-enabled/tjbrackett.com to activate.

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name tjbrackett.com www.tjbrackett.com api.tjbrackett.com;
    return 301 https://$host$request_uri;
}

# tjbrackett.com — React SPA
server {
    listen 443 ssl http2;
    server_name tjbrackett.com www.tjbrackett.com;

    ssl_certificate     /etc/letsencrypt/live/tjbrackett.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tjbrackett.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    root  /var/www/portfolio/frontend/dist;
    index index.html;

    # Pass real client IP to FastAPI
    set_real_ip_from  0.0.0.0/0;
    real_ip_header    X-Forwarded-For;
    real_ip_recursive on;

    # Serve static React build; fall back to index.html for SPA routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API + SSE to FastAPI
    location /api/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Required for SSE (GET /api/v1/visitors/stream)
        proxy_buffering        off;
        proxy_cache            off;
        proxy_read_timeout     3600s;
        proxy_connect_timeout  60s;
    }

    # Serve PDFs directly (place under /var/www/portfolio/static/)
    location /static/ {
        alias /var/www/portfolio/static/;
        add_header Content-Disposition inline;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
}

# api.tjbrackett.com — FastAPI backend (alternative subdomain entry point)
server {
    listen 443 ssl http2;
    server_name api.tjbrackett.com;

    ssl_certificate     /etc/letsencrypt/live/tjbrackett.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tjbrackett.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    set_real_ip_from  0.0.0.0/0;
    real_ip_header    X-Forwarded-For;
    real_ip_recursive on;

    location / {
        proxy_pass         http://127.0.0.1:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_buffering        off;
        proxy_cache            off;
        proxy_read_timeout     3600s;
    }
}
